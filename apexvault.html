<script>
document.addEventListener("DOMContentLoaded", () => {
    // --- MONETAG IN-APP INTERSTITIAL INITIALIZATION ---
    if (typeof show_10409688 !== 'undefined') {
        show_10409688({
          type: 'inApp',
          inAppSettings: {
            frequency: 2,
            capping: 0.1,
            interval: 30,
            timeout: 5,
            everyPage: false
          }
        }).catch(e => console.log("Monetag InApp Init Error:", e));
    }

    // === YOUR LIVE CLOUDFLARE BACKEND ===
    const API_URL = "https://apexvault-backend.cyberx-authority.workers.dev";
    
    // 1. Authenticate Telegram User
    const tg = window.Telegram?.WebApp;
    if (tg) tg.expand();
    const tgUser = tg?.initDataUnsafe?.user;
    
    // Fallback ID for testing
    const tgId = tgUser ? String(tgUser.id) : "test_user_001"; 

    // --- Configuration & Local Variables ---
    const MAX_ADS = 60;
    const RESET_INTERVAL_MS = 6 * 60 * 60 * 1000; // 6 hours
    
    let points = 0; 
    let adCount = parseInt(localStorage.getItem('av_adCount')) || 0;
    let firstAdTime = parseInt(localStorage.getItem('av_firstAdTime')) || null;
    let btnPresses = parseInt(localStorage.getItem('av_btnPresses')) || 0;
    let specialTarget = parseInt(localStorage.getItem('av_specialTarget')) || getRandomInt(8, 11);
    
    let isSpecialMode = btnPresses >= specialTarget;

    // --- Dynamic UI Selectors ---
    const ui = {
        userName: document.querySelector('header .flex-col span:first-child'),
        userHandle: document.querySelector('header .flex-col span:last-child'),
        pointsDisplay: document.querySelector('.text-\\[\\#0088CC\\].font-bold.text-sm'),
        progCurrent: document.querySelector('.text-4xl.font-extrabold'),
        progMax: document.querySelector('.text-xl.font-semibold'),
        progPercent: document.querySelector('.text-\\[11px\\].font-bold.text-on-surface-variant'),
        progRing: document.querySelector('.progress-ring-circle'),
        actionBtn: document.querySelector('button.bg-gradient-to-br'),
        statusText: document.querySelector('p.text-center.text-on-surface-variant'),
        statStreak: document.querySelectorAll('section.mt-4.grid > div')[0]?.querySelector('.text-2xl'),
        statRank: document.querySelectorAll('section.mt-4.grid > div')[1]?.querySelector('.text-2xl'),
        statMultiplier: document.querySelector('.col-span-2 .text-primary'),
        multiplierCard: document.querySelector('.col-span-2') 
    };

    // === INITIALIZE APP VIA CLOUDFLARE ===
    function loadUserData() {
        if (tgUser) {
            ui.userName.innerText = `${tgUser.first_name} ${tgUser.last_name || ''}`.trim();
            ui.userHandle.innerText = `@${tgUser.username || tgUser.id}`;
            
            const avatarImg = document.querySelector('header img');
            if (avatarImg) {
                if (tgUser.photo_url) avatarImg.src = tgUser.photo_url;
                else avatarImg.src = `https://ui-avatars.com/api/?name=${tgUser.first_name || 'User'}&background=006193&color=fff&rounded=true`;
            }
        }

        fetch(`${API_URL}/api/init`, {
            method: "POST",
            body: JSON.stringify({ telegram_id: tgId }),
            headers: { 'Content-Type': 'application/json' }
        })
        .then(res => res.json())
        .then(data => {
            if(data.user) {
                points = data.user.balance; 
                updateUI();
            }
        }).catch(err => console.error("API Load Error:", err));
    }

    // --- Core Functions ---
    function getRandomInt(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

    function showToast(message) {
        const existing = document.getElementById('av-toast');
        if(existing) existing.remove();

        const toast = document.createElement('div');
        toast.id = 'av-toast';
        toast.className = 'fixed bottom-24 left-1/2 -translate-x-1/2 bg-[#2d3135] text-white px-5 py-2.5 rounded-full text-sm font-medium shadow-xl z-[150] transition-opacity duration-300 opacity-0 whitespace-nowrap';
        toast.innerText = message;
        document.body.appendChild(toast);

        requestAnimationFrame(() => toast.classList.remove('opacity-0'));

        setTimeout(() => {
            toast.classList.add('opacity-0');
            setTimeout(() => toast.remove(), 300);
        }, 2000);
    }

    function checkResetCycle() {
        if (firstAdTime && (Date.now() - firstAdTime) > RESET_INTERVAL_MS) {
            adCount = 0;
            firstAdTime = null;
            localStorage.setItem('av_adCount', 0);
            localStorage.removeItem('av_firstAdTime');
        }
    }

    function updateStreak() {
        const today = new Date();
        const dateStr = today.getFullYear() + '-' + String(today.getMonth() + 1).padStart(2, '0') + '-' + String(today.getDate()).padStart(2, '0');
        
        let lastDate = localStorage.getItem('av_lastLoginDate');
        let currentStreak = parseInt(localStorage.getItem('av_streakCount')) || 0;

        if (lastDate === dateStr) {
            // Do nothing
        } else if (lastDate) {
            let yesterday = new Date(today);
            yesterday.setDate(yesterday.getDate() - 1);
            const yestStr = yesterday.getFullYear() + '-' + String(yesterday.getMonth() + 1).padStart(2, '0') + '-' + String(yesterday.getDate()).padStart(2, '0');
            
            if (lastDate === yestStr) currentStreak++;
            else currentStreak = 1; 
        } else {
            currentStreak = 1; 
        }

        localStorage.setItem('av_lastLoginDate', dateStr);
        localStorage.setItem('av_streakCount', currentStreak);
        
        if (ui.statStreak) ui.statStreak.innerText = currentStreak;
    }

    function generateMockStats() {
        const d = new Date();
        let period = d.getDate() <= 13 ? 1 : (d.getDate() <= 28 ? 2 : 3);
        const currentEpoch = `${d.getFullYear()}-${d.getMonth()}-${period}`;
        const savedEpoch = localStorage.getItem('av_statsEpoch');
        
        if (savedEpoch !== currentEpoch) {
            localStorage.setItem('av_statRank', getRandomInt(10, 5000));
            localStorage.setItem('av_statsEpoch', currentEpoch);
        }

        if(ui.statRank) ui.statRank.innerText = `#${localStorage.getItem('av_statRank')}`;
        if(ui.statMultiplier) ui.statMultiplier.innerText = `Tap to Upgrade`;
    }

    if (ui.multiplierCard) {
        ui.multiplierCard.classList.add('cursor-pointer', 'active:scale-[0.98]', 'transition-transform');
        ui.multiplierCard.addEventListener('click', () => { showToast("Coming soon"); });
    }

    function updateUI() {
        checkResetCycle();
        isSpecialMode = btnPresses >= specialTarget;

        ui.pointsDisplay.innerText = Number.isInteger(points) ? points : points.toFixed(1);

        ui.progCurrent.innerText = adCount;
        ui.progMax.innerText = `/ ${MAX_ADS}`;
        let percent = Math.min((adCount / MAX_ADS) * 100, 100);
        ui.progPercent.innerText = `${percent.toFixed(0)}% Complete`;

        const circumference = 691.15;
        const offset = circumference - (percent / 100) * circumference;
        ui.progRing.style.strokeDashoffset = offset;

        if (adCount >= MAX_ADS) {
            ui.actionBtn.classList.add('opacity-50', 'pointer-events-none', 'grayscale');
            ui.actionBtn.innerHTML = `<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">check_circle</span> Limit Reached`;
            let timeLeft = (firstAdTime + RESET_INTERVAL_MS) - Date.now();
            let hrs = Math.floor((timeLeft / (1000 * 60 * 60)) % 24);
            let mins = Math.floor((timeLeft / 1000 / 60) % 60);
            ui.statusText.innerText = `Limit reached. Resets in ${hrs}h ${mins}m`;
        } else {
            ui.actionBtn.classList.remove('opacity-50', 'pointer-events-none', 'grayscale');
            if (isSpecialMode) {
                ui.actionBtn.innerHTML = `<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">ads_click</span> Click / Visit`;
                ui.actionBtn.className = "w-full bg-gradient-to-br from-[#8b4c00] to-[#af6100] text-on-primary py-4 px-6 rounded-xl font-bold text-lg shadow-lg flex items-center justify-center gap-3 active:scale-[0.97] transition-all duration-200";
                ui.statusText.innerText = `High Reward Task Available!`;
            } else {
                ui.actionBtn.innerHTML = `<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">play_circle</span> Watch Ads`;
                ui.actionBtn.className = "w-full bg-gradient-to-br from-primary to-primary-container text-on-primary py-4 px-6 rounded-xl font-bold text-lg shadow-[0_8px_24px_rgba(0,97,147,0.25)] flex items-center justify-center gap-3 active:scale-[0.97] transition-all duration-200";
                ui.statusText.innerText = `${specialTarget - btnPresses} tasks until High Reward`;
            }
        }
    }

    // --- Action Button Click (SDK Integrated) ---
    ui.actionBtn.addEventListener('click', () => {
        if (adCount >= MAX_ADS) return;
        
        // Show Loading State
        const originalHtml = ui.actionBtn.innerHTML;
        const originalClass = ui.actionBtn.className;
        
        ui.actionBtn.innerHTML = `<span class="material-symbols-outlined animate-spin">sync</span> Loading Ad...`;
        ui.actionBtn.classList.add('opacity-80', 'pointer-events-none');
        ui.statusText.innerText = "Please wait...";

        if (typeof show_10409688 !== 'undefined') {
            if (isSpecialMode) {
                // High Reward Ad (Popup)
                show_10409688('pop').then(() => {
                    finishTask(true);
                    resetButton(originalHtml, originalClass);
                }).catch(e => {
                    console.log("Ad Error:", e);
                    showToast("Ad failed to load or closed early.");
                    resetButton(originalHtml, originalClass);
                });
            } else {
                // Standard Ad (Interstitial)
                show_10409688().then(() => {
                    finishTask(true);
                    resetButton(originalHtml, originalClass);
                }).catch(e => {
                    console.log("Ad Error:", e);
                    showToast("Ad failed to load or closed early.");
                    resetButton(originalHtml, originalClass);
                });
            }
        } else {
            showToast("Ad Network is still connecting. Try again.");
            resetButton(originalHtml, originalClass);
        }

        function resetButton(html, cls) {
            ui.actionBtn.innerHTML = html;
            ui.actionBtn.className = cls;
            updateUI(); // Resets status text
        }
    });

    // === SAVE EARNINGS TO CLOUDFLARE ===
    function finishTask(success) {
        if (success) {
            let reward = isSpecialMode ? (Math.random() < 0.5 ? 2.5 : 3.0) : (Math.random() < 0.5 ? 1.0 : 1.5);
            let title = isSpecialMode ? "Watched High-Reward Ad" : "Watched Standard Ad";

            // Securely tell the DB to add points
            fetch(`${API_URL}/api/action`, {
                method: "POST",
                body: JSON.stringify({ 
                    telegram_id: tgId, 
                    action: "earn", 
                    amount: reward,
                    title: title 
                }),
                headers: { 'Content-Type': 'application/json' }
            })
            .then(res => res.json())
            .then(data => {
                if (data.user) {
                    points = data.user.balance; 
                    updateUI();
                }
            }).catch(err => console.error("Error saving reward:", err));

            if (isSpecialMode) {
                btnPresses = 0;
                specialTarget = getRandomInt(8, 11);
                localStorage.setItem('av_specialTarget', specialTarget);
            } else {
                btnPresses++;
            }

            adCount++;
            if (!firstAdTime) firstAdTime = Date.now();
            
            localStorage.setItem('av_adCount', adCount);
            localStorage.setItem('av_firstAdTime', firstAdTime);
            localStorage.setItem('av_btnPresses', btnPresses);
            
            showToast(`Reward unlocked! +${reward} points`);
            updateUI();
        }
    }

    // Boot App
    updateStreak();
    generateMockStats();
    loadUserData(); 
});
</script>
